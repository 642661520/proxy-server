# ─── YAML 纯服务端精简镜像 ───
# 构建: docker build -f deploy/Dockerfile.yaml -t proxy-server .
# 无 SQLite、无 Express、仅 6 个 npm 依赖

FROM node:22-alpine
WORKDIR /app

# 安装运行时依赖（版本由 package.json 统一管理）
COPY server/package.json ./
RUN npm install --production

# 复制源码
COPY server/src/ ./src/
COPY server/tsconfig.json ./

# 入口
COPY deploy/entrypoint.sh /entrypoint.sh
RUN chmod +x /entrypoint.sh

RUN mkdir -p /app/www /app/data/logs
EXPOSE 3000
ENTRYPOINT ["/entrypoint.sh"]
