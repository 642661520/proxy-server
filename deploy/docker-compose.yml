version: '3.8'

services:
  # ─── YAML 纯服务端模式 ───
  proxy-yaml:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.yaml
    ports:
      - "3003:3003"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ../static-demo:/app/www:ro        # 静态文件目录
    environment:
      - CONFIG_FILE=/app/config.yaml
    restart: unless-stopped
